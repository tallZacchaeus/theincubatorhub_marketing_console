# =============================================================================
# Admin Analytics & Marketing Console — nginx vhost
# Serves the built Vite SPA (static files) at https://analytics.<DOMAIN>
#
# This is a STATIC SPA. It calls the existing Laravel API on the same parent
# domain and shares the admin session via a parent-domain cookie. So this vhost
# serves files only — no PHP, no reverse proxy. (Cross-subdomain auth is handled
# by the API's SESSION_DOMAIN=.<DOMAIN> + SANCTUM_STATEFUL_DOMAINS + CORS.)
#
# BEFORE USING — replace the two placeholders:
#   <DOMAIN>     -> your registrable domain, e.g. theincubatorhub.com
#   <DIST_PATH>  -> absolute path to the built `dist/` dir, e.g.
#                   /var/www/analytics-console/dist
#
# THEN:
#   1) Add a DNS A/AAAA record:  analytics.<DOMAIN> -> this server's IP
#   2) sudo ln -s this-file /etc/nginx/sites-enabled/   (or copy into conf.d/)
#   3) sudo nginx -t && sudo systemctl reload nginx
#   4) sudo certbot --nginx -d analytics.<DOMAIN>        (issues + wires TLS)
#      certbot will fill in the ssl_certificate lines and the :443 redirect.
# =============================================================================

# ---- HTTP :80 — ACME challenges + redirect everything else to HTTPS ----------
server {
    listen 80;
    listen [::]:80;
    server_name analytics.<DOMAIN>;

    # Let certbot answer renewal challenges over plain HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS :443 — serve the SPA ---------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name analytics.<DOMAIN>;

    root <DIST_PATH>;
    index index.html;

    # --- TLS (certbot --nginx will manage / overwrite these three lines) ------
    ssl_certificate     /etc/letsencrypt/live/analytics.<DOMAIN>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/analytics.<DOMAIN>/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # --- Security headers ------------------------------------------------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;          # standalone app, never iframed
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HSTS — enable once you're confident HTTPS is stable across the apex:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- Compression -----------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/manifest+json font/woff2;

    # --- Hashed build assets: cache hard (Vite fingerprints filenames) --------
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # --- SPA fallback: every unknown path returns index.html ------------------
    # This is what makes client-side routes (/reports/overview, /operations,
    # deep links, refreshes) work instead of 404ing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Never cache the HTML shell, so new deploys take effect immediately ---
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
        expires 0;
    }

    # Don't serve dotfiles (.env, .git, etc.) if any slip into the dist dir.
    location ~ /\.(?!well-known) {
        deny all;
    }
}

# -----------------------------------------------------------------------------
# OPTIONAL — avoid CORS entirely by reverse-proxying the API under this host.
# Only if you'd rather call the API at https://analytics.<DOMAIN>/api instead of
# a separate api.<DOMAIN>. If you use this, point the console's VITE_API_BASE_URL
# at https://analytics.<DOMAIN> and you can drop the console origin from CORS.
# Add INSIDE the :443 server block above:
#
#   location /api/ {
#       proxy_pass         http://127.0.0.1:9000;   # your php-fpm/app upstream
#       proxy_set_header   Host $host;
#       proxy_set_header   X-Real-IP $remote_addr;
#       proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
#       proxy_set_header   X-Forwarded-Proto $scheme;
#   }
#   location /sanctum/ { ... same proxy_pass ... }   # CSRF cookie endpoint
# -----------------------------------------------------------------------------
